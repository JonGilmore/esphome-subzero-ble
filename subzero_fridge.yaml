# Sub-Zero Fridge/Freezer BLE Package
# Include with vars: prefix, appliance_name, appliance_mac, appliance_pin
# Optional vars:
#   hide_freezer: "true" to hide freezer temp & door (default: "false")
#   hide_ice_maker: "true" to hide ice maker (default: "false")
#   hide_sabbath: "true" to hide sabbath mode (default: "false")
#   hide_crisper: "false" to show crisper drawer temp (default: "true")
#   hide_air_filter: "false" to show air filter sensors (default: "true")
#   hide_water_filter: "false" to show water filter sensor (default: "true")
#
# Example (fridge/freezer combo - all sensors exposed):
#   packages:
#     main_fridge: !include
#       file: subzero_fridge.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Main Fridge"
#         appliance_mac: !secret main_fridge_mac
#         appliance_pin: !secret main_fridge_pin
#
# Example (fridge-only - no freezer or ice maker):
#   packages:
#     basement_fridge: !include
#       file: subzero_fridge.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Basement Fridge"
#         appliance_mac: !secret basement_fridge_mac
#         appliance_pin: !secret basement_fridge_pin
#         hide_freezer: "true"
#         hide_ice_maker: "true"
#
# Example (wine fridge - dual zone, no freezer or ice maker):
#   packages:
#     wine_fridge: !include
#       file: subzero_fridge.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Wine Fridge"
#         appliance_mac: !secret wine_fridge_mac
#         appliance_pin: !secret wine_fridge_pin
#         hide_freezer: "true"
#         hide_ice_maker: "true"
#         hide_wine: "false"
#
# Example (fridge with refrigerator drawer - e.g. PRO3650G):
#   packages:
#     fridge: !include
#       file: subzero_fridge.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Fridge"
#         appliance_mac: !secret fridge_mac
#         appliance_pin: !secret fridge_pin
#         hide_ref_drawer: "false"

substitutions:
  hide_freezer: "false"
  hide_ice_maker: "false"
  hide_sabbath: "false"
  hide_wine: "true"
  hide_ref_drawer: "true"
  hide_crisper: "true"
  hide_air_filter: "true"
  hide_water_filter: "true"

packages:
  base: !include subzero_base.yaml

# Per-appliance hub + sensor-publishing bus. Hub is wired up in on_boot
# below: transport (BLE I/O), scheduler (timer wrapper), bus (sensor
# pointers), status/PIN-input callbacks, name, poll_offset, persisted
# PIN. Default-constructed values are safe before on_boot fires (no
# IDF calls happen pre-boot).
globals:
  - id: ${prefix}_bus
    type: esphome::subzero_protocol::FridgeBus
    restore_value: false
  - id: ${prefix}_hub
    type: esphome::subzero_appliance::FridgeHub
    restore_value: false

esphome:
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            auto& b = id(${prefix}_bus);
            // Common (declared in subzero_base.yaml)
            b.svc_required = id(${prefix}_svc_required);
            b.model = id(${prefix}_model);
            b.uptime = id(${prefix}_uptime);
            b.serial = id(${prefix}_serial);
            b.appliance_type = id(${prefix}_appliance_type);
            b.diag_status = id(${prefix}_diag_status);
            b.build_date = id(${prefix}_build_date);
            b.fw_version = id(${prefix}_fw_version);
            b.api_version = id(${prefix}_api_version);
            b.bleapp_version = id(${prefix}_bleapp_version);
            b.os_version = id(${prefix}_os_version);
            b.rtapp_version = id(${prefix}_rtapp_version);
            b.board_version = id(${prefix}_board_version);
            b.door_ajar = id(${prefix}_door_ajar);
            // Fridge / freezer
            b.sabbath_on = id(${prefix}_sabbath_on);
            b.set_temp = id(${prefix}_set_temp);
            b.frz_set_temp = id(${prefix}_frz_set_temp);
            b.frz_door_ajar = id(${prefix}_frz_door_ajar);
            b.ice_maker = id(${prefix}_ice_maker);
            // Refrigerator drawer
            b.ref2_set_temp = id(${prefix}_ref2_set_temp);
            b.ref2_door_ajar = id(${prefix}_ref2_door_ajar);
            // Wine
            b.wine_door_ajar = id(${prefix}_wine_door_ajar);
            b.wine_set_temp = id(${prefix}_wine_set_temp);
            b.wine2_set_temp = id(${prefix}_wine2_set_temp);
            b.wine_temp_alert = id(${prefix}_wine_temp_alert);
            // Crisper
            b.crisp_set_temp = id(${prefix}_crisp_set_temp);
            // Filters
            b.air_filter_on = id(${prefix}_air_filter_on);
            b.air_filter_pct = id(${prefix}_air_filter_pct);
            b.water_filter_pct = id(${prefix}_water_filter_pct);
            // Wire the hub: transport + scheduler + bus + callbacks.
            id(${prefix}_transport).set_client(id(${prefix}_appliance));
            id(${prefix}_scheduler).set_component(id(${prefix}_appliance));
            auto& hub = id(${prefix}_hub);
            hub.set_transport(&id(${prefix}_transport));
            hub.set_scheduler(&id(${prefix}_scheduler));
            hub.set_name("${appliance_name}");
            hub.set_bus(&b);
            hub.set_stored_pin(id(${prefix}_stored_pin));
            hub.set_pin_confirmed(id(${prefix}_pin_confirmed));
            hub.set_status_callback([](const std::string& s) {
              id(${prefix}_debug).publish_state(s);
            });
            hub.set_pin_input_callback([](const std::string& p) {
              id(${prefix}_stored_pin) = p;
              id(${prefix}_pin_confirmed) = true;
              id(${prefix}_pin_input).publish_state(p);
            });
            // Inject discovered handles into the ESPHome ble_client
            // notify sensors. Required on fast reconnect with stale
            // GATT cache where ESPHome's UUID-based auto-registration
            // can't find the characteristics.
            hub.set_subscribe_callback([]() {
              uint16_t d5 = id(${prefix}_hub).d5_handle();
              uint16_t d6 = id(${prefix}_hub).d6_handle();
              if (d5 > 0) id(${prefix}_d5_notify)->handle = d5;
              if (d6 > 0) id(${prefix}_d6_notify)->handle = d6;
            });

sensor:
  - platform: template
    name: "${appliance_name} Set Temperature"
    id: ${prefix}_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer"

  - platform: template
    name: "${appliance_name} Freezer Set Temperature"
    id: ${prefix}_frz_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:snowflake-thermometer"
    internal: ${hide_freezer}

  - platform: template
    name: "${appliance_name} Wine Zone Upper Set Temperature"
    id: ${prefix}_wine_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:glass-wine"
    internal: ${hide_wine}

  - platform: template
    name: "${appliance_name} Wine Zone Lower Set Temperature"
    id: ${prefix}_wine2_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:glass-wine"
    internal: ${hide_wine}

  - platform: template
    name: "${appliance_name} Refrigerator Drawer Set Temperature"
    id: ${prefix}_ref2_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer"
    internal: ${hide_ref_drawer}

  - platform: template
    name: "${appliance_name} Crisper Drawer Set Temperature"
    id: ${prefix}_crisp_set_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:thermometer"
    internal: ${hide_crisper}

  - platform: template
    name: "${appliance_name} Air Filter Remaining"
    id: ${prefix}_air_filter_pct
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:air-filter"
    internal: ${hide_air_filter}

  - platform: template
    name: "${appliance_name} Water Filter Remaining"
    id: ${prefix}_water_filter_pct
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:water-percent"
    internal: ${hide_water_filter}

binary_sensor:
  - platform: template
    name: "${appliance_name} Sabbath Mode"
    id: ${prefix}_sabbath_on
    icon: "mdi:candelabra"
    internal: ${hide_sabbath}

  - platform: template
    name: "${appliance_name} Freezer Door"
    id: ${prefix}_frz_door_ajar
    device_class: door
    internal: ${hide_freezer}

  - platform: template
    name: "${appliance_name} Ice Maker"
    id: ${prefix}_ice_maker
    icon: "mdi:ice-cream"
    internal: ${hide_ice_maker}

  - platform: template
    name: "${appliance_name} Wine Door"
    id: ${prefix}_wine_door_ajar
    device_class: door
    internal: ${hide_wine}

  - platform: template
    name: "${appliance_name} Wine Temperature Alert"
    id: ${prefix}_wine_temp_alert
    device_class: problem
    internal: ${hide_wine}

  - platform: template
    name: "${appliance_name} Refrigerator Drawer Door"
    id: ${prefix}_ref2_door_ajar
    device_class: door
    internal: ${hide_ref_drawer}

  - platform: template
    name: "${appliance_name} Air Filter"
    id: ${prefix}_air_filter_on
    icon: "mdi:air-filter"
    internal: ${hide_air_filter}

# parse_json script removed in Phase 3 - FridgeHub::parse_and_dispatch_
# now handles JSON parsing, status-302 detection, PIN confirmation
# (via on_pin_confirmed_), and dispatch through the FridgeBus. The hub
# is invoked from the D6 notify lambda in subzero_base.yaml whenever a
# complete JSON message has been buffered.
