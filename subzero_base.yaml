# Sub-Zero / Wolf / Cove - Shared BLE Package
# Do not include this file directly. Use one of the appliance-type packages:
#   subzero_fridge.yaml      - Sub-Zero refrigerators and freezers
#   subzero_dishwasher.yaml  - Cove dishwashers
#   subzero_range.yaml       - Wolf ranges and ovens
#
# Phase 3 of the C++-out-of-YAML refactor: the entire BLE state machine
# now lives in `components/subzero_appliance/`. This file declares the
# entities (sensors, buttons, text inputs) and wires the BLE client's
# triggers + button presses to one-line calls into the SubzeroHub
# instance declared by the appliance YAML.

substitutions:
  poll_offset: "0s"

# external_components is declared by the entry-point yaml. Both
# `patch_acl_reassembly`, `subzero_protocol`, and `subzero_appliance`
# must be listed there for the activations below to resolve.
patch_acl_reassembly:
subzero_protocol:
subzero_appliance:
json:

esp32_ble:
  io_capability: keyboard_only
  max_connections: 5

esp32_ble_tracker:
  scan_parameters:
    active: false

# Persisted state lives as YAML globals so it survives reboots. Volatile
# state (handles, json buffer, retry counters, phase) is owned by the
# SubzeroHub C++ instance - see components/subzero_appliance/hub.h.
globals:
  - id: ${prefix}_stored_pin
    type: std::string
    restore_value: true
    initial_value: '"${appliance_pin}"'
  - id: ${prefix}_pin_confirmed
    type: bool
    restore_value: true
    initial_value: "true"
  - id: ${prefix}_debug_mode
    type: bool
    initial_value: "false"
  # Per-appliance BleTransport - wraps the BLE client for the hub's IDF
  # calls. Default-constructed with a null client; on_boot wires it up.
  - id: ${prefix}_transport
    type: esphome::subzero_appliance::EspIdfTransport
    restore_value: false
  # Per-appliance Scheduler - wraps App.scheduler with the BLE client as
  # the timeout owner. Default-constructed; on_boot wires it up.
  - id: ${prefix}_scheduler
    type: esphome::subzero_appliance::EsphomeScheduler
    restore_value: false

ble_client:
  - mac_address: ${appliance_mac}
    name: "SZG ${appliance_name}"
    id: ${prefix}_appliance
    auto_connect: true
    on_passkey_request:
      then:
        - ble_client.passkey_reply:
            id: ${prefix}_appliance
            passkey: !lambda 'return id(${prefix}_hub).handle_passkey_request();'
    on_connect:
      then:
        - lambda: 'id(${prefix}_hub).handle_connected();'
    on_disconnect:
      then:
        - lambda: 'id(${prefix}_hub).handle_disconnected();'

sensor:
  - platform: ble_client
    type: characteristic
    ble_client_id: ${prefix}_appliance
    name: "${appliance_name} D5 Notify"
    id: ${prefix}_d5_notify
    internal: true
    service_uuid: "E20A39F4-73F5-4BC4-A12F-17D1AD07A961"
    characteristic_uuid: "08590F7E-DB05-467E-8757-72F6FAEB13D5"
    notify: true
    update_interval: never
    lambda: |-
      id(${prefix}_hub).handle_d5_notify(x.data(), x.size());
      return {};

  - platform: ble_client
    type: characteristic
    ble_client_id: ${prefix}_appliance
    name: "${appliance_name} D6 Notify"
    id: ${prefix}_d6_notify
    internal: true
    service_uuid: "E20A39F4-73F5-4BC4-A12F-17D1AD07A961"
    characteristic_uuid: "08590F7E-DB05-467E-8757-72F6FAEB13D6"
    notify: true
    update_interval: never
    lambda: |-
      id(${prefix}_hub).handle_d6_notify(x.data(), x.size());
      return {};

binary_sensor:
  - platform: template
    name: "${appliance_name} Door"
    id: ${prefix}_door_ajar
    device_class: door

  - platform: template
    name: "${appliance_name} Service Required"
    id: ${prefix}_svc_required
    device_class: problem

text_sensor:
  - platform: template
    name: "${appliance_name} Status"
    id: ${prefix}_debug

  - platform: template
    name: "${appliance_name} Model"
    id: ${prefix}_model
    icon: "mdi:devices"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Uptime"
    id: ${prefix}_uptime
    icon: "mdi:timer-outline"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Appliance Serial"
    id: ${prefix}_serial
    icon: "mdi:identifier"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Appliance Type"
    id: ${prefix}_appliance_type
    icon: "mdi:shape"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Diagnostic Status"
    id: ${prefix}_diag_status
    icon: "mdi:stethoscope"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Firmware Version"
    id: ${prefix}_fw_version
    icon: "mdi:chip"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} API Version"
    id: ${prefix}_api_version
    icon: "mdi:api"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} BLE App Version"
    id: ${prefix}_bleapp_version
    icon: "mdi:bluetooth"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} OS Version"
    id: ${prefix}_os_version
    icon: "mdi:memory"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} RTApp Version"
    id: ${prefix}_rtapp_version
    icon: "mdi:application-cog"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Appliance Board Version"
    id: ${prefix}_board_version
    icon: "mdi:developer-board"
    entity_category: diagnostic

  - platform: template
    name: "${appliance_name} Build Date"
    id: ${prefix}_build_date
    icon: "mdi:calendar-clock"
    entity_category: diagnostic

text:
  - platform: template
    name: "${appliance_name} PIN"
    id: ${prefix}_pin_input
    icon: "mdi:key-variant"
    entity_category: config
    min_length: 0
    max_length: 10
    mode: text
    optimistic: true
    on_value:
      then:
        - lambda: |-
            if (x.length() > 0) {
              id(${prefix}_stored_pin) = x;
              id(${prefix}_hub).set_stored_pin(x);
              ESP_LOGI("szg", "[${appliance_name}] PIN updated: %s", x.c_str());
            }

switch:
  - platform: template
    name: "${appliance_name} Debug Mode"
    id: ${prefix}_debug_switch
    icon: "mdi:bug"
    entity_category: diagnostic
    optimistic: true
    turn_on_action:
      - lambda: |-
          id(${prefix}_debug_mode) = true;
          id(${prefix}_hub).set_debug_mode(true);
    turn_off_action:
      - lambda: |-
          id(${prefix}_debug_mode) = false;
          id(${prefix}_hub).set_debug_mode(false);

button:
  - platform: template
    name: "Connect to ${appliance_name}"
    icon: "mdi:bluetooth-connect"
    on_press:
      - logger.log: "[${appliance_name}] Initiating connection..."
      - lambda: 'id(${prefix}_hub).press_connect();'
      - ble_client.connect:
          id: ${prefix}_appliance

  - platform: template
    name: "${appliance_name} Start Pairing"
    icon: "mdi:key-plus"
    on_press:
      - lambda: 'id(${prefix}_hub).press_start_pairing();'

  - platform: template
    name: "${appliance_name} Submit PIN & Unlock"
    icon: "mdi:lock-open-variant"
    on_press:
      - lambda: 'id(${prefix}_hub).press_submit_pin();'

  - platform: template
    name: "Poll ${appliance_name}"
    icon: "mdi:refresh"
    on_press:
      - lambda: 'id(${prefix}_hub).press_poll();'

  - platform: template
    name: "${appliance_name} Log Debug Info"
    icon: "mdi:bug-play"
    entity_category: diagnostic
    on_press:
      # Hub.press_log_debug_info enables debug mode and forces a
      # disconnect; auto_connect brings the connection back via the
      # full post_bond + subscribe path with a fresh full-state poll.
      # Keeps the debug switch state in sync.
      - lambda: |-
          id(${prefix}_debug_mode) = true;
          id(${prefix}_debug_switch).publish_state(true);
          id(${prefix}_hub).press_log_debug_info();

  - platform: template
    name: "Disconnect ${appliance_name}"
    icon: "mdi:bluetooth-off"
    on_press:
      - ble_client.disconnect:
          id: ${prefix}_appliance

  - platform: template
    name: "Reset ${appliance_name} Pairing"
    icon: "mdi:bluetooth-settings"
    entity_category: config
    on_press:
      - logger.log: "[${appliance_name}] Full pairing reset..."
      - lambda: |-
          id(${prefix}_pin_confirmed) = false;
          id(${prefix}_hub).press_reset_pairing();
      - ble_client.disconnect:
          id: ${prefix}_appliance
      - delay: 1s
      - ble_client.remove_bond:
          id: ${prefix}_appliance

interval:
  - interval: 60s
    then:
      - delay: ${poll_offset}
      - lambda: 'id(${prefix}_hub).do_periodic_poll();'
