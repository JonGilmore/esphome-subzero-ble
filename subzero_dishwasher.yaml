# Cove Dishwasher BLE Package
# Include with vars: prefix, appliance_name, appliance_mac, appliance_pin
# Optional vars:
#   hide_softener: "false" to show water softener sensor (default: "true")
#
# Example:
#   packages:
#     right_dishwasher: !include
#       file: subzero_dishwasher.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Right Dishwasher"
#         appliance_mac: !secret right_dishwasher_mac
#         appliance_pin: !secret right_dishwasher_pin
#
# Example (DW2450WS with water softener):
#   packages:
#     dishwasher: !include
#       file: subzero_dishwasher.yaml
#       vars:
#         prefix: "szg"
#         appliance_name: "Dishwasher"
#         appliance_mac: !secret dishwasher_mac
#         appliance_pin: !secret dishwasher_pin
#         hide_softener: "false"

substitutions:
  hide_softener: "true"

packages:
  base: !include subzero_base.yaml

# Per-appliance hub + sensor-publishing bus. See subzero_fridge.yaml's
# matching block for the wiring pattern.
globals:
  - id: ${prefix}_bus
    type: esphome::subzero_protocol::DishwasherBus
    restore_value: false
  - id: ${prefix}_hub
    type: esphome::subzero_appliance::DishwasherHub
    restore_value: false

esphome:
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            id(${prefix}_wash_time_remaining).publish_state(0);
            id(${prefix}_wash_cycle_end_time).publish_state("");
            auto& b = id(${prefix}_bus);
            // Common (declared in subzero_base.yaml)
            b.svc_required = id(${prefix}_svc_required);
            b.model = id(${prefix}_model);
            b.uptime = id(${prefix}_uptime);
            b.serial = id(${prefix}_serial);
            b.appliance_type = id(${prefix}_appliance_type);
            b.diag_status = id(${prefix}_diag_status);
            b.build_date = id(${prefix}_build_date);
            b.fw_version = id(${prefix}_fw_version);
            b.api_version = id(${prefix}_api_version);
            b.bleapp_version = id(${prefix}_bleapp_version);
            b.os_version = id(${prefix}_os_version);
            b.rtapp_version = id(${prefix}_rtapp_version);
            b.board_version = id(${prefix}_board_version);
            b.door_ajar = id(${prefix}_door_ajar);
            // Dishwasher-specific
            b.wash_cycle_on = id(${prefix}_wash_cycle_on);
            b.heated_dry = id(${prefix}_heated_dry);
            b.extended_dry = id(${prefix}_extended_dry);
            b.high_temp_wash = id(${prefix}_high_temp_wash);
            b.sani_rinse = id(${prefix}_sani_rinse);
            b.rinse_aid_low = id(${prefix}_rinse_aid_low);
            b.softener_low = id(${prefix}_softener_low);
            b.light_on = id(${prefix}_light_on);
            b.remote_ready = id(${prefix}_remote_ready);
            b.delay_start = id(${prefix}_delay_start);
            b.wash_status = id(${prefix}_wash_status);
            b.wash_cycle = id(${prefix}_wash_cycle);
            b.wash_time_remaining = id(${prefix}_wash_time_remaining);
            b.wash_cycle_end_time = id(${prefix}_wash_cycle_end_time);
            // Hub wiring
            id(${prefix}_transport).set_client(id(${prefix}_appliance));
            id(${prefix}_scheduler).set_component(id(${prefix}_appliance));
            auto& hub = id(${prefix}_hub);
            hub.set_transport(&id(${prefix}_transport));
            hub.set_scheduler(&id(${prefix}_scheduler));
            hub.set_name("${appliance_name}");
            hub.set_bus(&b);
            hub.set_stored_pin(id(${prefix}_stored_pin));
            hub.set_pin_confirmed(id(${prefix}_pin_confirmed));
            hub.set_status_callback([](const std::string& s) {
              id(${prefix}_debug).publish_state(s);
            });
            hub.set_pin_input_callback([](const std::string& p) {
              id(${prefix}_stored_pin) = p;
              id(${prefix}_pin_confirmed) = true;
              id(${prefix}_pin_input).publish_state(p);
            });
            hub.set_subscribe_callback([]() {
              uint16_t d5 = id(${prefix}_hub).d5_handle();
              uint16_t d6 = id(${prefix}_hub).d6_handle();
              if (d5 > 0) id(${prefix}_d5_notify)->handle = d5;
              if (d6 > 0) id(${prefix}_d6_notify)->handle = d6;
            });

sensor:
  - platform: template
    name: "${appliance_name} Wash Status"
    id: ${prefix}_wash_status
    icon: "mdi:dishwasher"
    accuracy_decimals: 0

  - platform: template
    name: "${appliance_name} Wash Cycle"
    id: ${prefix}_wash_cycle
    icon: "mdi:counter"
    accuracy_decimals: 0

  - platform: template
    name: "${appliance_name} Wash Time Remaining"
    id: ${prefix}_wash_time_remaining
    icon: "mdi:timer-sand"
    unit_of_measurement: "min"
    accuracy_decimals: 0
    device_class: duration

binary_sensor:
  - platform: template
    name: "${appliance_name} Wash Cycle Active"
    id: ${prefix}_wash_cycle_on
    icon: "mdi:dishwasher"

  - platform: template
    name: "${appliance_name} Heated Dry"
    id: ${prefix}_heated_dry
    icon: "mdi:heat-wave"

  - platform: template
    name: "${appliance_name} Extended Dry"
    id: ${prefix}_extended_dry
    icon: "mdi:heat-wave"

  - platform: template
    name: "${appliance_name} High Temp Wash"
    id: ${prefix}_high_temp_wash
    icon: "mdi:thermometer-high"

  - platform: template
    name: "${appliance_name} Sanitize Rinse"
    id: ${prefix}_sani_rinse
    icon: "mdi:hand-wash"

  - platform: template
    name: "${appliance_name} Rinse Aid Low"
    id: ${prefix}_rinse_aid_low
    device_class: problem

  - platform: template
    name: "${appliance_name} Light"
    id: ${prefix}_light_on
    icon: "mdi:lightbulb"

  - platform: template
    name: "${appliance_name} Remote Ready"
    id: ${prefix}_remote_ready
    icon: "mdi:remote"

  - platform: template
    name: "${appliance_name} Delay Start"
    id: ${prefix}_delay_start
    icon: "mdi:timer-sand"

  - platform: template
    name: "${appliance_name} Softener Low"
    id: ${prefix}_softener_low
    device_class: problem
    internal: ${hide_softener}

text_sensor:
  - platform: template
    name: "${appliance_name} Wash Cycle End Time"
    id: ${prefix}_wash_cycle_end_time
    icon: "mdi:clock-end"

# parse_json script removed in Phase 3 - DishwasherHub::parse_and_dispatch_
# now handles JSON parsing, status-302 detection, PIN confirmation, and
# dispatch through the DishwasherBus (including the stateful
# clear_wash_time_remaining_if_running hook). See subzero_fridge.yaml's
# matching note.
